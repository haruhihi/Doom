<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="cg" x1="0" y1="80" x2="400" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0d68a" stop-opacity="0.25"/>
      <stop offset=".5" stop-color="#d4a843" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#c9a96e" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <!-- Main cloud body -->
  <ellipse cx="200" cy="130" rx="160" ry="50" fill="url(#cg)"/>
  <!-- Upper bumps -->
  <circle cx="130" cy="100" r="60" fill="url(#cg)"/>
  <circle cx="200" cy="82" r="68" fill="url(#cg)"/>
  <circle cx="270" cy="96" r="54" fill="url(#cg)"/>
  <!-- Small accent bumps -->
  <circle cx="90" cy="118" r="36" fill="url(#cg)"/>
  <circle cx="310" cy="114" r="38" fill="url(#cg)"/>
  <!-- Soft wispy edges -->
  <ellipse cx="60" cy="140" rx="50" ry="24" fill="url(#cg)"/>
  <ellipse cx="340" cy="138" rx="48" ry="22" fill="url(#cg)"/>
</svg>
